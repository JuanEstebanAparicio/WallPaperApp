<ion-header>
  <ion-toolbar color="primary" class="login-toolbar">
    <ion-buttons slot="end">
      <ion-button fill="clear" (click)="toggleLang()">
        <ion-icon slot="icon-only" name="language-outline"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content class="login-background">
  <div class="login-container">
    <ion-card class="login-card">
      <ion-card-header>
        <div class="logo-container">
          <ion-icon name="image-outline" class="app-logo"></ion-icon>
        </div>
        <ion-card-title>{{ 'login.title' | translate }}</ion-card-title>
        <ion-card-subtitle>{{ 'login.subtitle' | translate }}</ion-card-subtitle>
      </ion-card-header>

      <ion-card-content>
        <form (ngSubmit)="onLogin()">
          <ion-item class="input-item">
            <ion-icon name="mail-outline" slot="start"></ion-icon>
            <ion-input
              [(ngModel)]="email"
              name="email"
              type="email"
              [placeholder]="'login.email' | translate"
              required
            ></ion-input>
          </ion-item>

          <ion-item class="input-item">
            <ion-icon name="lock-closed-outline" slot="start"></ion-icon>
            <ion-input
              [(ngModel)]="password"
              name="password"
              type="password"
              [placeholder]="'login.password' | translate"
              required
            ></ion-input>
          </ion-item>

          <ion-button expand="block" type="submit" class="login-btn">
            {{ 'login.button' | translate }}
          </ion-button>

          <ion-button
            expand="block"
            fill="clear"
            class="register-link"
            routerLink="/auth/register"
          >
            {{ 'login.register' | translate }}
          </ion-button>
        </form>
      </ion-card-content>
    </ion-card>
  </div>
</ion-content>
