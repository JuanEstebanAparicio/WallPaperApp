<ion-header>
  <ion-toolbar color="primary" class="register-toolbar">
    <ion-buttons slot="end">
      <ion-button fill="clear" (click)="toggleLang()">
        <ion-icon slot="icon-only" name="language-outline"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content class="login-background">
  <div class="login-container">
    <ion-card class="login-card">
      <ion-card-header>
        <div class="logo-container">
          <ion-icon name="image-outline" class="app-logo"></ion-icon>
        </div>
        <ion-card-title>{{ 'register.title' | translate }}</ion-card-title>
        <ion-card-subtitle>{{ 'register.subtitle' | translate }}</ion-card-subtitle>
      </ion-card-header>

      <ion-card-content>
        <form (ngSubmit)="onRegister()">

          <!-- Nombre de usuario -->
          <ion-item class="input-item">
            <ion-icon name="person-outline" slot="start"></ion-icon>
            <ion-input
              [(ngModel)]="username"
              name="username"
              type="text"
              [placeholder]="'register.username' | translate"
              required
            ></ion-input>
          </ion-item>

          <!-- Correo electrónico -->
          <ion-item class="input-item">
            <ion-icon name="mail-outline" slot="start"></ion-icon>
            <ion-input
              [(ngModel)]="email"
              name="email"
              type="email"
              [placeholder]="'register.email' | translate"
              required
            ></ion-input>
          </ion-item>

          <!-- Contraseña -->
          <ion-item class="input-item">
            <ion-icon name="lock-closed-outline" slot="start"></ion-icon>
            <ion-input
              [(ngModel)]="password"
              name="password"
              type="password"
              [placeholder]="'register.password' | translate"
              required
            ></ion-input>
          </ion-item>

          <!-- Confirmar contraseña -->
          <ion-item class="input-item">
            <ion-icon name="lock-closed-outline" slot="start"></ion-icon>
            <ion-input
              [(ngModel)]="confirmPassword"
              name="confirmPassword"
              type="password"
              [placeholder]="'register.confirm' | translate"
              required
            ></ion-input>
          </ion-item>

          <!-- Botón registrar -->
          <ion-button expand="block" type="submit" class="login-btn">
            {{ 'register.button' | translate }}
          </ion-button>

          <!-- Link a login -->
          <ion-button
            expand="block"
            fill="clear"
            class="register-link"
            routerLink="/auth/login"
          >
            {{ 'register.login' | translate }}
          </ion-button>
        </form>
      </ion-card-content>
    </ion-card>
  </div>
</ion-content>
