<ion-header>
  <ion-toolbar color="primary">
    <ion-title>Bienvenido</ion-title>
    <ion-buttons slot="end">
      <ion-button (click)="logout()">
        <ion-icon name="log-out-outline"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding home-background">
  <!-- Tarjeta de usuario -->
  <div class="user-card">
    <ion-avatar>
      <ion-icon name="person-circle-outline" class="user-icon"></ion-icon>
    </ion-avatar>
    <h2>{{ displayName || 'Usuario' }}</h2>
    <p>{{ email }}</p>
  </div>

  <!-- Lista de wallpapers -->
  <ion-card class="gallery-card">
    <ion-card-header>
      <ion-card-title>Tus Wallpapers</ion-card-title>
    </ion-card-header>
    <ion-card-content>
      <p *ngIf="!wallpapers.length" class="empty-text">
        Aquí aparecerán tus wallpapers subidos.
      </p>

      <ion-grid *ngIf="wallpapers.length">
        <ion-row>
          <ion-col size="6" size-md="4" size-lg="3" *ngFor="let wp of wallpapers">
            <div class="wallpaper-item">
              <img [src]="wp.url" [alt]="wp.name" />
              <div class="overlay">
                <span>{{ wp.name }}</span>
              </div>
            </div>
          </ion-col>
        </ion-row>
      </ion-grid>

      <!-- Botón de subida -->
      <ion-button expand="block" (click)="selectFile()">Subir wallpaper</ion-button>
      <input type="file" hidden #fileInput (change)="onFileSelected($event)" />
    </ion-card-content>
  </ion-card>
</ion-content>
